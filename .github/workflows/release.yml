name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build universal binary
        run: ./package.sh

      - name: Generate release notes
        run: |
          # Find previous tag to generate changelog
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            # Extract commit subjects since last tag (skip merge commits)
            NOTES=$(git log --pretty=format:"%s" --no-merges "${PREV_TAG}..HEAD" | grep -v "^Update appcast.xml" || true)
          else
            NOTES=$(git log --pretty=format:"%s" --no-merges -10 | grep -v "^Update appcast.xml" || true)
          fi
          # Save to file for multi-line handling
          echo "$NOTES" > /tmp/release_notes.txt
          echo "Release notes:"
          cat /tmp/release_notes.txt

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.0"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "SIGN_UPDATE=/tmp/sparkle/bin/sign_update" >> "$GITHUB_ENV"

      - name: Sign update with Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          echo "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          SIGNATURE=$("$SIGN_UPDATE" -f "$KEY_FILE" dist/BrowserRouter.zip)
          rm -f "$KEY_FILE"
          echo "SPARKLE_SIGNATURE=$SIGNATURE" >> "$GITHUB_ENV"
          echo "Signed successfully"

      - name: Update appcast.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          python3 scripts/update_appcast.py \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --signature "$SPARKLE_SIGNATURE" \
            --notes "$(cat /tmp/release_notes.txt)" \
            --file dist/BrowserRouter.zip

      - name: Commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add appcast.xml
          git diff --cached --quiet && echo "No appcast changes" || \
            (git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}" && git push origin main)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 dist/BrowserRouter.zip | awk '{print $1}')
          # Build markdown release notes
          NOTES=$(cat /tmp/release_notes.txt)
          BODY=$(cat <<EOF
          ## What's Changed
          $(echo "$NOTES" | sed 's/^/- /')

          ---
          SHA256: \`${SHA256}\`
          EOF
          )
          gh release create "$GITHUB_REF_NAME" dist/BrowserRouter.zip \
            --title "$GITHUB_REF_NAME" \
            --notes "$BODY"
